<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>@hou_enj/illustration</title>

  <meta property="og:title" content="苞 イラストギャラリー">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hou-gallery.pages.dev/">
  <meta property="og:image" content="https://hou-gallery.pages.dev/images/1%20(18).jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <nav class="icons">
      <a href="./">ホーム</a>
      <a href="https://x.com/hou_enj" target="_blank" rel="noopener">X</a>
      <a href="mailto:hou.ekaki@gmail.com">Mail</a>
      <button id="secretKey" class="secret-key" aria-label="secret">√</button>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="hero-visual">
        <img id="heroImage" class="hero-image" src="" alt="苞のイラスト">
      </div>
    </section>

    <div id="msg" class="msg"></div>

    <section id="tags" class="section">
      <div class="tagbar-wrap">
        <button id="tagPrev" class="tag-nav" type="button" aria-label="prev tag">‹</button>
        <div id="tagbar" class="tagbar" aria-label="tags"></div>
        <button id="tagNext" class="tag-nav" type="button" aria-label="next tag">›</button>
      </div>
    </section>

    <section class="section section-work">
      <div class="section-head">
        <h2 class="section-title">
          <span>新着</span>
          <small>new works</small>
        </h2>
      </div>
      <div id="recent" class="hscroll"></div>
    </section>

    <section id="gallery" class="section section-work">
      <div class="section-head">
        <h2 class="section-title">
          <span>作品</span>
          <small>works</small>
        </h2>
      </div>
      <div id="random" class="grid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-card">
      <div class="profile-block">
        <h2>Profile ✦</h2>

        <p class="lead">苞(@hou_enj)のイラストまとめサイトです。</p>
        <p>にじさんじ（剣持刀也中心）のファンアート中心。</p>
        <p>画像の無断転載 / 自作発言 / AI学習は禁止とします。</p>
        <p>御用がありましたらMailよりご連絡下さい。</p>

    
      </div>

      <div class="contact-block">
        <h2>Contact ✦</h2>
        <p><a href="mailto:hou.ekaki@gmail.com">Mail / メール</a></p>
        <p><a href="https://x.com/hou_enj" target="_blank" rel="noopener">X(Twitter)</a></p>
      </div>
    </div>

    <p class="copyright">© hou illustration</p>
  </footer>

  <div id="modal" class="modal" aria-hidden="true">
    <button id="close" class="close-btn" aria-label="close">×</button>

    <div class="modal-inner">
      <img id="modal-img" class="modal-content" alt="">

      <div id="reaction-bar" class="reaction-bar">
        <div id="reactions-container" class="reactions-container"></div>

        <button id="share-btn" class="share-btn" type="button">
          <span class="share-x">Xへ共有</span>
        </button>
      </div>
    </div>

    <button class="nav prev" id="prev" type="button" aria-label="prev">‹</button>
    <button class="nav next" id="next" type="button" aria-label="next">›</button>
  </div>

  <script src="./app.js"></script>
  <script>
    const key = document.getElementById("secretKey");
    if (key) key.addEventListener("click", () => location.href = "/enter.html");
  </script>
</body>
</html>
